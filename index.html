<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily ToDoList</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-logo">✅</div>
      <h1 class="login-title">Daily ToDoList</h1>
      <p class="login-desc">구글 계정으로 로그인하고<br/>나만의 할 일을 관리하세요</p>
      <button class="btn-google" id="btnGoogle" onclick="signInWithGoogle()">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Google로 로그인
      </button>
    </div>
  </div>

  <!-- App (shown after login) -->
  <div class="app" id="app" style="display:none">

    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="header-left">
          <span class="logo">✅ Daily ToDoList</span>
        </div>
        <div class="header-right">
          <span class="today-date" id="todayDate"></span>
          <div class="user-info" id="userInfo">
            <img class="user-avatar" id="userAvatar" src="" alt="avatar" />
            <span class="user-name" id="userName"></span>
            <button class="btn-logout" onclick="signOut()">로그아웃</button>
          </div>
        </div>
      </div>
    </header>

    <!-- Board -->
    <main class="board">
      <div class="columns" id="columns">

        <!-- 할 일 -->
        <div class="column" id="col-todo" data-column="todo">
          <div class="column-header">
            <span class="column-title">할 일</span>
            <span class="column-count" id="count-todo">0</span>
          </div>
          <div class="card-list" id="list-todo"
            ondragover="onDragOver(event)"
            ondrop="onDrop(event, 'todo')"
            ondragleave="onDragLeave(event)">
          </div>
          <button class="add-card-btn" onclick="openModal('todo')">+ 카드 추가</button>
        </div>

        <!-- 진행 중 -->
        <div class="column" id="col-inprogress" data-column="inprogress">
          <div class="column-header">
            <span class="column-title">진행 중</span>
            <span class="column-count" id="count-inprogress">0</span>
          </div>
          <div class="card-list" id="list-inprogress"
            ondragover="onDragOver(event)"
            ondrop="onDrop(event, 'inprogress')"
            ondragleave="onDragLeave(event)">
          </div>
          <button class="add-card-btn" onclick="openModal('inprogress')">+ 카드 추가</button>
        </div>

        <!-- 완료 -->
        <div class="column" id="col-done" data-column="done">
          <div class="column-header">
            <span class="column-title">완료</span>
            <span class="column-count" id="count-done">0</span>
          </div>
          <div class="card-list" id="list-done"
            ondragover="onDragOver(event)"
            ondrop="onDrop(event, 'done')"
            ondragleave="onDragLeave(event)">
          </div>
          <button class="add-card-btn" onclick="openModal('done')">+ 카드 추가</button>
        </div>

      </div>
    </main>

  </div>

  <!-- Task Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">태스크 추가</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>제목 <span class="required">*</span></label>
          <input type="text" id="inputTitle" placeholder="태스크 제목을 입력하세요" />
        </div>
        <div class="form-group">
          <label>설명</label>
          <textarea id="inputDesc" placeholder="상세 내용을 입력하세요 (선택)" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>마감일</label>
          <input type="date" id="inputDate" />
        </div>
        <div class="form-group">
          <label>우선순위</label>
          <div class="priority-group">
            <label class="priority-option">
              <input type="radio" name="priority" value="high" /> <span class="priority-badge high">높음</span>
            </label>
            <label class="priority-option">
              <input type="radio" name="priority" value="medium" checked /> <span class="priority-badge medium">보통</span>
            </label>
            <label class="priority-option">
              <input type="radio" name="priority" value="low" /> <span class="priority-badge low">낮음</span>
            </label>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-save" id="btnSave" onclick="saveTask()">저장</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="deleteOverlay">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 class="modal-title">태스크 삭제</h2>
      </div>
      <div class="modal-body">
        <p>이 태스크를 삭제하시겠습니까?</p>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeDeleteModal()">취소</button>
        <button class="btn-delete" onclick="confirmDelete()">삭제</button>
      </div>
    </div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
